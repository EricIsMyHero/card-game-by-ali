<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Card Battle Advanced</title>
<style>
body {
  font-family: Arial;
  background: #111;
  color: #fff;
  text-align: center;
}
h1 { margin-top: 20px; }
.container { margin-top: 20px; }
.cards {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 10px;
  margin-top: 20px;
}
.card {
  width: 120px;
  height: 150px;
  background: #222;
  border: 2px solid #555;
  padding: 10px;
  cursor: pointer;
  font-size: 14px;
}
.card:hover { background: #333; }
.stats { margin-top: 10px; }
button {
  margin-top: 20px;
  padding: 10px 20px;
  cursor: pointer;
}
</style>
</head>
<body>

<h1>Card Battle</h1>

<div class="container">
  <p>Your HP: <span id="playerHP">100</span></p>
  <p>AI HP: <span id="aiHP">100</span></p>

  <div class="cards" id="cards"></div>

  <p id="log">Choose a card</p>

<button onclick="startGame()">Restart</button>

</div>

<script>
let playerHP, aiHP, playerCards;

const baseCards = [
  { attack: 10, shield: 5, heal: 0, crit: 0.2 },
  { attack: 20, shield: 0, heal: 0, crit: 0.1 },
  { attack: 5, shield: 10, heal: 5, crit: 0.3 },
  { attack: 15, shield: 3, heal: 0, crit: 0.25 },
  { attack: 8, shield: 8, heal: 2, crit: 0.2 }
];

function startGame() {
  playerHP = 100;
  aiHP = 100;
  playerCards = JSON.parse(JSON.stringify(baseCards));
  document.getElementById("log").innerText = "Choose a card";
  updateUI();
  renderCards();
}

function renderCards() {
  const container = document.getElementById("cards");
  container.innerHTML = "";

  playerCards.forEach((c, i) => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
      ATK: ${c.attack}<br>
      SHD: ${c.shield}<br>
      HEAL: ${c.heal}<br>
      CRIT: ${Math.floor(c.crit * 100)}%
    `;
    div.onclick = () => playTurn(i);
    container.appendChild(div);
  });
}

function applyCrit(attack, crit) {
  if (Math.random() < crit) {
    return attack * 1.5;
  }
  return attack;
}

function calculateDamage(damage, shield) {
  let blocked = Math.min(shield, damage * 0.7);
  return damage - blocked;
}

function aiChooseCard() {
  // sadə ağıllı seçim
  if (aiHP < 30) {
    return { attack: 5, shield: 10, heal: 10, crit: 0.2 };
  }
  return baseCards[Math.floor(Math.random() * baseCards.length)];
}

function playTurn(index) {
  const playerCard = playerCards[index];
  const aiCard = aiChooseCard();

  // Heal
  playerHP += playerCard.heal;
  aiHP += aiCard.heal;

  // Attack + crit
  let pAtk = applyCrit(playerCard.attack, playerCard.crit);
  let aAtk = applyCrit(aiCard.attack, aiCard.crit);

  // Damage
  let dmgToAI = calculateDamage(pAtk, aiCard.shield);
  let dmgToPlayer = calculateDamage(aAtk, playerCard.shield);

  aiHP -= dmgToAI;
  playerHP -= dmgToPlayer;

  playerCards.splice(index, 1);

  document.getElementById("log").innerText =
    `You: ${Math.floor(pAtk)} dmg | AI: ${Math.floor(aAtk)} dmg`;

  updateUI();

  if (playerHP <= 0 || aiHP <= 0 || playerCards.length === 0) {
    endGame();
  } else {
    renderCards();
  }
}

function updateUI() {
  document.getElementById("playerHP").innerText = Math.max(0, Math.floor(playerHP));
  document.getElementById("aiHP").innerText = Math.max(0, Math.floor(aiHP));
}

function endGame() {
  let result = "Draw!";
  if (playerHP > aiHP) result = "You Won!";
  if (aiHP > playerHP) result = "You Lost!";

  document.getElementById("log").innerText = result;
  document.getElementById("cards").innerHTML = "";
}

startGame();
</script>

</body>
</html>
