<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card Battle</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Arial, sans-serif;
    background: #111;
    color: #fff;
    min-height: 100vh;
  }
  #root {
    max-width: 720px;
    margin: 0 auto;
    padding: 16px;
  }

  /* SCREENS */
  .screen { display: none; }
  .screen.active { display: block; }

  /* DECK BUILDER */
  .deck-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .deck-title { font-size: 18px; font-weight: bold; }
  .deck-count  { font-size: 13px; color: #aaa; }

  .deck-slots {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    padding: 10px;
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 10px;
    margin-bottom: 12px;
    min-height: 50px;
  }
  .slot {
    width: 60px;
    height: 34px;
    border-radius: 6px;
    border: 1px dashed #444;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    color: #555;
    cursor: pointer;
    transition: all .15s;
    text-align: center;
    padding: 2px 4px;
    line-height: 1.2;
  }
  .slot.filled { border-style: solid; font-size: 9px; font-weight: bold; }
  .slot.filled:hover { opacity: .65; }

  .filter-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }
  .fbtn {
    padding: 4px 12px;
    font-size: 11px;
    border: 1px solid #444;
    border-radius: 20px;
    background: #1a1a1a;
    color: #aaa;
    cursor: pointer;
    transition: all .12s;
  }
  .fbtn.active { background: #1a3a5c; color: #4da6ff; border-color: #4da6ff; }

  .all-cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
    gap: 8px;
    margin-bottom: 14px;
  }
  .pcard {
    background: #1e1e1e;
    border: 1px solid #333;
    border-radius: 10px;
    padding: 9px 7px 8px;
    cursor: pointer;
    transition: transform .12s, border-color .12s;
    position: relative;
    text-align: center;
  }
  .pcard:hover            { transform: translateY(-3px); border-color: #4da6ff; }
  .pcard.selected         { border: 2px solid #4da6ff; background: #1a2d42; }
  .pcard.dimmed           { opacity: .35; cursor: default; }
  .pcard.dimmed:hover     { transform: none; border-color: #333; }
  .pcard-cost {
    position: absolute;
    top: 5px; right: 5px;
    width: 17px; height: 17px;
    border-radius: 50%;
    background: #378ADD;
    color: #fff;
    font-size: 9px;
    font-weight: bold;
    display: flex; align-items: center; justify-content: center;
  }
  .pcard-icon  { font-size: 22px; margin: 2px 0 4px; line-height: 1; }
  .pcard-name  { font-size: 10px; font-weight: bold; color: #eee; margin-bottom: 4px; line-height: 1.2; }
  .pcard-type  { font-size: 8px; padding: 1px 6px; border-radius: 8px; display: inline-block; }

  /* type badge colors */
  .t-attack  { background: #3d1a10; color: #f0997b; }
  .t-heal    { background: #1a3010; color: #7cc452; }
  .t-shield  { background: #0d2440; color: #85b7eb; }
  .t-buff    { background: #2a1a4a; color: #afa9ec; }
  .t-debuff  { background: #3a2800; color: #ef9f27; }
  .t-poison  { background: #252520; color: #9fa09a; }

  .start-btn {
    width: 100%;
    padding: 11px;
    font-size: 14px;
    font-weight: bold;
    background: #378ADD;
    color: #fff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: opacity .15s;
  }
  .start-btn:hover    { opacity: .85; }
  .start-btn:disabled { opacity: .35; cursor: not-allowed; }

  /* BATTLE HUD */
  .hud {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }
  .hp-block { display: flex; flex-direction: column; gap: 3px; }
  .hp-label { font-size: 10px; color: #aaa; font-weight: bold; letter-spacing: .05em; }
  .hp-bar-bg {
    height: 10px;
    border-radius: 5px;
    background: #2a2a2a;
    border: 1px solid #333;
    overflow: hidden;
  }
  .hp-bar { height: 100%; border-radius: 5px; transition: width .5s ease; }
  .hp-val { font-size: 15px; font-weight: bold; }
  .vs-badge {
    font-size: 12px;
    color: #888;
    text-align: center;
    padding: 4px 10px;
    border: 1px solid #333;
    border-radius: 8px;
    background: #1a1a1a;
  }

  .energy-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 10px;
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 8px;
    margin-bottom: 8px;
  }
  .pips { display: flex; gap: 3px; flex: 1; }
  .pip {
    width: 18px; height: 8px;
    border-radius: 3px;
    background: #333;
    transition: background .2s;
  }
  .pip.on { background: #EF9F27; }
  .turn-txt { font-size: 11px; color: #aaa; }

  .hand-lbl {
    font-size: 10px;
    color: #888;
    font-weight: bold;
    letter-spacing: .05em;
    margin-bottom: 6px;
  }
  .hand {
    display: flex;
    gap: 7px;
    flex-wrap: wrap;
    min-height: 110px;
    margin-bottom: 8px;
  }

  /* GAME CARDS */
  .gcard {
    width: 100px;
    background: #1e1e1e;
    border: 1px solid #444;
    border-radius: 10px;
    padding: 8px 7px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 2px;
    position: relative;
    transition: transform .15s, border-color .15s, box-shadow .15s;
  }
  .gcard:hover:not(.cant) {
    transform: translateY(-6px) scale(1.05);
    border-color: #4da6ff;
    box-shadow: 0 0 0 2px #1a3a5c;
  }
  .gcard.cant         { opacity: .4; cursor: not-allowed; }
  .gcard.cant:hover   { transform: none; box-shadow: none; border-color: #444; }
  .gcard.play-anim    { animation: cardPlay .35s ease forwards; }
  @keyframes cardPlay {
    0%   { transform: translateY(0) scale(1); opacity: 1; }
    40%  { transform: translateY(-20px) scale(1.1); opacity: 1; }
    100% { transform: translateY(60px) scale(.7); opacity: 0; }
  }
  .gcard-cost {
    position: absolute;
    top: 5px; right: 5px;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: #378ADD;
    color: #fff;
    font-size: 8px;
    font-weight: bold;
    display: flex; align-items: center; justify-content: center;
  }
  .gcard-icon { font-size: 20px; text-align: center; line-height: 1; margin-bottom: 2px; }
  .gcard-name { font-size: 10px; font-weight: bold; color: #eee; line-height: 1.2; }
  .gcard-stat {
    font-size: 9px;
    color: #888;
    display: flex;
    justify-content: space-between;
  }
  .gcard-stat span:last-child { color: #ddd; font-weight: bold; }

  .ai-row {
    padding: 7px 10px;
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 8px;
    margin-bottom: 8px;
    font-size: 12px;
    min-height: 34px;
    color: #888;
  }

  /* played cards this turn */
  .played-row {
    padding: 7px 10px;
    background: #1a1a1a;
    border: 1px solid #2a3a1a;
    border-radius: 8px;
    margin-bottom: 8px;
    font-size: 12px;
    min-height: 32px;
    color: #7cc452;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }
  .played-row .plbl { color: #555; font-size: 10px; font-weight: bold; letter-spacing:.04em; margin-right: 2px; }
  .played-tag {
    background: #1e3010;
    border: 1px solid #3a5a20;
    color: #7cc452;
    border-radius: 5px;
    padding: 1px 7px;
    font-size: 11px;
  }

  .log-box {
    padding: 8px 11px;
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 8px;
    font-size: 13px;
    color: #eee;
    line-height: 1.5;
    margin-bottom: 8px;
    min-height: 36px;
  }
  .log-box .hit     { color: #f0997b; font-weight: bold; }
  .log-box .heal-t  { color: #7cc452; font-weight: bold; }

  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .gbtn {
    padding: 7px 14px;
    font-size: 13px;
    border: 1px solid #444;
    background: #1e1e1e;
    color: #eee;
    border-radius: 8px;
    cursor: pointer;
    transition: background .12s;
  }
  .gbtn:hover { background: #2a2a2a; }

  /* DAMAGE POP */
  .dmg-pop {
    position: absolute;
    font-size: 16px;
    font-weight: bold;
    pointer-events: none;
    animation: popUp .7s ease forwards;
    z-index: 50;
    white-space: nowrap;
  }
  @keyframes popUp {
    0%   { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-40px); opacity: 0; }
  }

  /* RESULT SCREEN */
  .result-screen {
    text-align: center;
    padding: 40px 16px;
  }
  .result-title  { font-size: 30px; font-weight: bold; margin-bottom: 8px; }
  .result-sub    { font-size: 14px; color: #aaa; margin-bottom: 28px; }
  .result-stats  {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }
  .rstat {
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 10px;
    padding: 14px 22px;
    min-width: 80px;
  }
  .rstat-val { font-size: 24px; font-weight: bold; }
  .rstat-lbl { font-size: 11px; color: #888; margin-top: 3px; }
  .result-btns { display: flex; gap: 12px; justify-content: center; }
</style>
</head>
<body>

<div id="root">

  <!-- DECK BUILDER SCREEN -->
  <div class="screen active" id="deckScreen">
    <div class="deck-header">
      <div class="deck-title">Deck qur</div>
      <div class="deck-count" id="deckCount">0 / 8 seçilib</div>
    </div>
    <div class="deck-slots" id="deckSlots"></div>
    <div class="filter-row" id="filterRow"></div>
    <div class="all-cards" id="allCards"></div>
    <button class="start-btn" id="startBtn" disabled onclick="startBattle()">
      Döyüşə başla (8 kart seç)
    </button>
  </div>

  <!-- BATTLE SCREEN -->
  <div class="screen" id="battleScreen">
    <div class="hud">
      <div class="hp-block">
        <div class="hp-label">SƏN</div>
        <div class="hp-bar-bg">
          <div class="hp-bar" id="pBar" style="background:#1D9E75;width:100%"></div>
        </div>
        <div class="hp-val" id="pHP">100</div>
      </div>
      <div class="vs-badge" id="turnBadge">Tur 1</div>
      <div class="hp-block" style="text-align:right">
        <div class="hp-label" style="text-align:right">AI</div>
        <div class="hp-bar-bg">
          <div class="hp-bar" id="aBar" style="background:#D85A30;width:100%"></div>
        </div>
        <div class="hp-val" id="aHP">100</div>
      </div>
    </div>

    <div class="energy-row">
      <div style="font-size:11px;color:#888;min-width:52px">Enerji</div>
      <div class="pips" id="pips"></div>
      <div class="turn-txt" id="turnTxt">Tur 1</div>
    </div>

    <div class="hand-lbl">ƏLİNDƏKİ KARTLAR (Maks: 4)</div>
    <div class="hand" id="hand"></div>

    <div class="played-row" id="playedRow"><span class="plbl">BU TUR:</span><span id="playedList" style="color:#555">heç bir kart oynanmadı</span></div>
    <div class="ai-row" id="aiRow">AI gözləyir...</div>
    <div class="log-box" id="logBox">Kart seçin!</div>

    <div class="btn-row">
      <button class="gbtn" onclick="endTurn()">Turu bitir</button>
      <button class="gbtn" onclick="goToDeck()">Deck dəyiş</button>
    </div>
  </div>

  <!-- RESULT SCREEN -->
  <div class="screen" id="resultScreen">
    <div class="result-screen">
      <div class="result-title" id="resultTitle">Qazandın!</div>
      <div class="result-sub"   id="resultSub"></div>
      <div class="result-stats">
        <div class="rstat">
          <div class="rstat-val" id="rHP">-</div>
          <div class="rstat-lbl">Qalan HP</div>
        </div>
        <div class="rstat">
          <div class="rstat-val" id="rTurns">-</div>
          <div class="rstat-lbl">Tur sayı</div>
        </div>
        <div class="rstat">
          <div class="rstat-val" id="rCards">-</div>
          <div class="rstat-lbl">Əldə kart</div>
        </div>
      </div>
      <div class="result-btns">
        <button class="gbtn" onclick="startBattle()">Yenidən oyna</button>
        <button class="gbtn" onclick="goToDeck()">Deck dəyiş</button>
      </div>
    </div>
  </div>

</div>

<script>
/* DATA */
const ICONS = {
  attack: "⚔", heal: "💚", shield: "🛡",
  buff: "✨", debuff: "💀", poison: "☠"
};

const TYPE_CLS = {
  attack: "t-attack", heal: "t-heal", shield: "t-shield",
  buff: "t-buff", debuff: "t-debuff", poison: "t-poison"
};

const ALL_CARDS = [
  { id:0,  name:"Qılınc",        type:"attack", cost:2, atk:18, shd:0,  heal:0,  crit:.20, poison:0,  buffNext:0,   debuff:0   },
  { id:1,  name:"Dual Hücum",    type:"attack", cost:4, atk:30, shd:0,  heal:0,  crit:.25, poison:0,  buffNext:0,   debuff:0   },
  { id:2,  name:"Oxçu",          type:"attack", cost:1, atk:10, shd:0,  heal:0,  crit:.15, poison:0,  buffNext:0,   debuff:0   },
  { id:3,  name:"Snayper",       type:"attack", cost:3, atk:22, shd:0,  heal:0,  crit:.35, poison:0,  buffNext:0,   debuff:0   },
  { id:4,  name:"Ninja",         type:"attack", cost:3, atk:25, shd:0,  heal:0,  crit:.40, poison:0,  buffNext:0,   debuff:0   },
  { id:5,  name:"Həyat Seli",    type:"heal",   cost:2, atk:0,  shd:0,  heal:20, crit:0,   poison:0,  buffNext:0,   debuff:0   },
  { id:6,  name:"Sürətli Şəfa",  type:"heal",   cost:1, atk:0,  shd:0,  heal:12, crit:0,   poison:0,  buffNext:0,   debuff:0   },
  { id:7,  name:"Böyük Şəfa",    type:"heal",   cost:4, atk:0,  shd:0,  heal:35, crit:0,   poison:0,  buffNext:0,   debuff:0   },
  { id:8,  name:"Healer",        type:"heal",   cost:3, atk:5,  shd:5,  heal:18, crit:.10, poison:0,  buffNext:0,   debuff:0   },
  { id:9,  name:"Qalxan",        type:"shield", cost:2, atk:5,  shd:18, heal:0,  crit:.10, poison:0,  buffNext:0,   debuff:0   },
  { id:10, name:"Dəmir Zireh",   type:"shield", cost:3, atk:0,  shd:28, heal:0,  crit:0,   poison:0,  buffNext:0,   debuff:0   },
  { id:11, name:"Titan",         type:"shield", cost:5, atk:20, shd:35, heal:0,  crit:.15, poison:0,  buffNext:0,   debuff:0   },
  { id:12, name:"Güc Ruhu",      type:"buff",   cost:2, atk:8,  shd:5,  heal:5,  crit:.10, poison:0,  buffNext:.30, debuff:0   },
  { id:13, name:"Bərk Yumruq",   type:"buff",   cost:3, atk:15, shd:0,  heal:0,  crit:.10, poison:0,  buffNext:.50, debuff:0   },
  { id:14, name:"Büyücü",        type:"buff",   cost:4, atk:12, shd:8,  heal:8,  crit:.15, poison:3,  buffNext:.20, debuff:.10  },
  { id:15, name:"Zəhərli Ox",    type:"poison", cost:2, atk:8,  shd:0,  heal:0,  crit:.15, poison:6,  buffNext:0,   debuff:0   },
  { id:16, name:"Zəhər Buludu",  type:"poison", cost:3, atk:5,  shd:0,  heal:0,  crit:.10, poison:10, buffNext:0,   debuff:0   },
  { id:17, name:"Zəiflik",       type:"debuff", cost:2, atk:5,  shd:0,  heal:0,  crit:.10, poison:0,  buffNext:0,   debuff:.25  },
  { id:18, name:"Qaranlıq Bağ",  type:"debuff", cost:3, atk:8,  shd:0,  heal:0,  crit:.10, poison:0,  buffNext:0,   debuff:.40  },
  { id:19, name:"Döyüşçü",       type:"attack", cost:2, atk:14, shd:6,  heal:0,  crit:.20, poison:0,  buffNext:0,   debuff:0   },
];

/* STATE */
let selectedDeck = [];
let activeFilter = "all";

let pHP, aHP, energy, turn, playerDeck, hand, deckIdx;
let pPoison, aPoison, pPoisonDmg, aPoisonDmg;
let pDebuff, aDebuff, pBuffNext, aBuffNext;
let turnsPlayed;
let playedThisTurn = [];
let playerQueuedCards = [];
let turnsBlocked = false;

/* AI STATE */
let aiDeck, aiHand, aiDeckIdx;

/* HELPERS */
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function show(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function goToDeck() {
  show("deckScreen");
  renderDeckBuilder();
}

function slotBg(t)     { return {attack:"#3d1a10",heal:"#1a3010",shield:"#0d2440",buff:"#2a1a4a",debuff:"#3a2800",poison:"#252520"}[t]||"#252520"; }
function slotBorder(t) { return {attack:"#f0997b",heal:"#7cc452",shield:"#85b7eb",buff:"#afa9ec",debuff:"#ef9f27",poison:"#9fa09a"}[t]||"#555"; }
function slotColor(t)  { return {attack:"#f0997b",heal:"#7cc452",shield:"#85b7eb",buff:"#afa9ec",debuff:"#ef9f27",poison:"#9fa09a"}[t]||"#aaa"; }

/* DECK BUILDER */
function renderDeckBuilder() {
  renderSlots();
  renderFilterBtns();
  renderAllCardsPicker();
  updateStartBtn();
}

function renderSlots() {
  const c = document.getElementById("deckSlots");
  c.innerHTML = "";
  for (let i = 0; i < 8; i++) {
    const d = document.createElement("div");
    d.className = "slot";
    if (selectedDeck[i] !== undefined) {
      d.classList.add("filled");
      const card = ALL_CARDS.find(x => x.id === selectedDeck[i]);
      d.style.background   = slotBg(card.type);
      d.style.borderColor  = slotBorder(card.type);
      d.style.color        = slotColor(card.type);
      d.textContent        = card.name;
      d.title              = `${card.name} - klik ilə çıxar`;
      d.onclick            = () => removeFromDeck(i);
    } else {
      d.textContent = i + 1;
    }
    c.appendChild(d);
  }
  document.getElementById("deckCount").textContent = `${selectedDeck.length} / 8 seçilib`;
}

function renderFilterBtns() {
  const row = document.getElementById("filterRow");
  row.innerHTML = "";
  ["all","attack","heal","shield","buff","debuff","poison"].forEach(f => {
    const b = document.createElement("button");
    b.className = "fbtn" + (activeFilter === f ? " active" : "");
    b.textContent = f === "all" ? "Hamısı" : f;
    b.onclick = () => { activeFilter = f; renderAllCardsPicker(); renderFilterBtns(); };
    row.appendChild(b);
  });
}

function renderAllCardsPicker() {
  const c = document.getElementById("allCards");
  c.innerHTML = "";
  const filtered = activeFilter === "all"
    ? ALL_CARDS
    : ALL_CARDS.filter(x => x.type === activeFilter);

  filtered.forEach(card => {
    const sel  = selectedDeck.includes(card.id);
    const full = selectedDeck.length >= 8 && !sel;
    const d    = document.createElement("div");
    d.className = "pcard" + (sel ? " selected" : "") + (full ? " dimmed" : "");
    d.innerHTML = `
      <div class="pcard-cost">${card.cost}</div>
      <div class="pcard-icon">${ICONS[card.type] || "?"}</div>
      <div class="pcard-name">${card.name}</div>
      <div class="pcard-type ${TYPE_CLS[card.type]}">${card.type}</div>
    `;
    if (!full || sel) {
      d.onclick = () => {
        if (sel) {
          removeFromDeckById(card.id);
        } else if (selectedDeck.length < 8) {
          selectedDeck.push(card.id);
          renderDeckBuilder();
        }
      };
    }
    c.appendChild(d);
  });
}

function removeFromDeck(i) {
  selectedDeck.splice(i, 1);
  renderDeckBuilder();
}

function removeFromDeckById(id) {
  const i = selectedDeck.indexOf(id);
  if (i >= 0) { selectedDeck.splice(i, 1); renderDeckBuilder(); }
}

function updateStartBtn() {
  const n = selectedDeck.length;
  const b = document.getElementById("startBtn");
  b.disabled     = n < 8;
  b.textContent  = n >= 8
    ? "Döyüşə başla"
    : `Döyüşə başla (${n}/8 seçilib)`;
}

/* BATTLE SETUP */
function startBattle() {
  pHP = 100; aHP = 100;
  energy = 4; turn = 1; turnsPlayed = 0;
  pPoison = 0; aPoison = 0; pPoisonDmg = 0; aPoisonDmg = 0;
  pDebuff = 0; aDebuff = 0; pBuffNext = 0;  aBuffNext = 0;
  playedThisTurn = [];
  playerQueuedCards = [];
  turnsBlocked   = false;

  // Oyunçu Dəstəsi
  const deckCards = selectedDeck.map(id => ALL_CARDS.find(c => c.id === id));
  playerDeck = shuffle(deckCards);
  deckIdx    = 0;
  hand       = [];
  
  // AI Dəstəsi (Təsadüfi 8 kart)
  const allShuffled = shuffle([...ALL_CARDS]);
  aiDeck = allShuffled.slice(0, 8);
  aiDeckIdx = 0;
  aiHand = [];

  drawCards();
  drawAiCards();

  show("battleScreen");
  renderBattle();
  document.getElementById("logBox").innerHTML  = "Kart seçin! Növbəyə almaq üçün klikləyin.";
  document.getElementById("aiRow").textContent = "AI gözləyir...";
}

function drawCards() {
  const toDraw = 4 - hand.length; // Maksimum 4 kart çəkir
  for (let i = 0; i < toDraw; i++) {
    if (deckIdx >= playerDeck.length) {
      playerDeck = shuffle(playerDeck);
      deckIdx    = 0;
    }
    hand.push({ ...playerDeck[deckIdx++] });
  }
}

function drawAiCards() {
  const toDraw = 4 - aiHand.length; // AI üçün də maksimum 4 kart
  for (let i = 0; i < toDraw; i++) {
    if (aiDeckIdx >= aiDeck.length) {
      aiDeck = shuffle(aiDeck);
      aiDeckIdx = 0;
    }
    aiHand.push({ ...aiDeck[aiDeckIdx++] });
  }
}

/* PLAYING CARDS (QUEUEING) */
function playCard(idx, el) {
  const c = hand[idx];
  if (c.cost > energy) { flashLog("Enerji kifayət deyil!"); return; }
  if (pHP <= 0 || aHP <= 0 || turnsBlocked) return;

  el.classList.add("play-anim");
  turnsBlocked = true;

  setTimeout(() => {
    energy -= c.cost;
    turnsPlayed++;
    playedThisTurn.push(c.name);
    playerQueuedCards.push(c); 

    hand.splice(idx, 1);
    turnsBlocked = false;

    document.getElementById("logBox").innerHTML = `<b>${c.name}</b> seçildi. Tətbiq etmək üçün turu bitirin.`;
    checkEnd();
    renderBattle();
    renderPlayedRow();
  }, 320);
}

/* APPLY CARDS DURING END TURN */
function runPlayerCards(cards, idx, done) {
  if (idx >= cards.length || aHP <= 0 || pHP <= 0) { done(); return; }
  const c = cards[idx];
  applyPlayerCard(c);
  renderBattle();
  setTimeout(() => runPlayerCards(cards, idx + 1, done), 600);
}

function runAiCards(cards, idx, done) {
  if (idx >= cards.length || pHP <= 0 || aHP <= 0) { done(); return; }
  const c = cards[idx];
  applyCardEffect(null, c); 
  const row = document.getElementById("aiRow");
  row.textContent = `AI oynadı: ${c.name}  ATK:${c.atk}  SHD:${c.shd}  HEAL:${c.heal}`;
  renderBattle();
  setTimeout(() => runAiCards(cards, idx + 1, done), 600);
}

/* END TURN */
function endTurn() {
  if (pHP <= 0 || aHP <= 0 || turnsBlocked) return;
  turnsBlocked = true;

  document.getElementById("logBox").innerHTML = "Sənin kartların tətbiq olunur...";

  runPlayerCards(playerQueuedCards, 0, () => {
    playerQueuedCards = [];

    if (pHP <= 0 || aHP <= 0) {
      checkEnd();
      return;
    }

    document.getElementById("aiRow").textContent = "AI düşünür...";

    let aiEnergy = 4; // Rəqibin enerjisi hər zaman sabit 4 olur.
    const aiPlayed = [];
    let aiAttempts = 0;
    while (aiEnergy > 0 && aiAttempts < 10) {
      const c = aiChooseFromHand(aiEnergy);
      if (!c) break;
      
      aiEnergy -= c.cost;
      const cardIndex = aiHand.indexOf(c);
      aiHand.splice(cardIndex, 1); // Seçilmiş kartı AI-nin əlindən silir.
      
      aiPlayed.push(c);
      aiAttempts++;
    }

    runAiCards(aiPlayed, 0, () => {
      if (pHP <= 0) { checkEnd(); return; }

      turn++;
      energy = 4; // Sizin enerjiniz sıfırlanır və yenidən sabit 4 olur.

      const msgs = [];
      if (pPoison > 0) { pHP -= pPoisonDmg; pPoison--; if(pPoison===0)pPoisonDmg=0; msgs.push(`Sən: zəhər -${pPoisonDmg||''}HP`); }
      if (aPoison > 0) { aHP -= aPoisonDmg; aPoison--; if(aPoison===0)aPoisonDmg=0; msgs.push(`AI: zəhər -${aPoisonDmg||''}HP`); }

      aHP = Math.max(0, aHP);
      pHP = Math.max(0, pHP);

      drawCards();
      drawAiCards();
      
      playedThisTurn = [];
      turnsBlocked   = false;

      if (msgs.length) {
        document.getElementById("logBox").innerHTML = msgs.join(" | ");
      } else {
        document.getElementById("logBox").innerHTML = `Tur ${turn} başladı! Enerji yeniləndi.`;
      }

      document.getElementById("aiRow").textContent = "AI gözləyir...";

      checkEnd();
      renderBattle();
      renderPlayedRow();
    });
  });
}

/* EFFECTS LOGIC */
function applyPlayerCard(c) {
  let pAtk = c.atk * (1 + pBuffNext); pBuffNext = 0;
  if (Math.random() < c.crit) pAtk *= 1.5;
  const shA = Math.min(0, 0); 
  const dAI = Math.max(0, pAtk);

  pHP += c.heal;
  aHP  = Math.max(0, aHP - dAI);

  if (c.poison   > 0) { aPoison = c.poison;  aPoisonDmg = Math.floor(c.poison); }
  if (c.buffNext > 0) pBuffNext = c.buffNext;
  if (c.debuff   > 0) aDebuff   = c.debuff;

  const parts = [];
  if (dAI    > 0) parts.push(`<span class="hit">AI -${Math.floor(dAI)}HP</span>`);
  if (c.heal > 0) parts.push(`<span class="heal-t">+${c.heal}HP</span>`);
  if (c.buffNext > 0) parts.push(`<span style="color:#afa9ec">növbəti +${Math.round(c.buffNext*100)}%</span>`);
  if (c.debuff   > 0) parts.push(`<span style="color:#ef9f27">AI zəiflər -${Math.round(c.debuff*100)}%</span>`);
  if (c.poison   > 0) parts.push(`☠ ${c.poison}t`);

  document.getElementById("logBox").innerHTML =
    `<b>${c.name}</b> tətbiq edildi - ${parts.join(", ")||"effekt yoxdur"}`;
  showHPPop(Math.floor(dAI), false);
}

function applyCardEffect(playerCard, aiC) {
  let aAtk = aiC.atk * (1 + aBuffNext); aBuffNext = 0;
  if (Math.random() < aiC.crit) aAtk *= 1.5;
  aAtk *= (1 - pDebuff); pDebuff = 0;

  const shP = Math.min(0, 0);
  const dP  = Math.max(0, aAtk);

  aHP += aiC.heal;
  pHP  = Math.max(0, pHP - dP);

  if (aiC.poison   > 0) { pPoison = aiC.poison;  pPoisonDmg = Math.floor(aiC.poison); }
  if (aiC.buffNext > 0) aBuffNext = aiC.buffNext;
  if (aiC.debuff   > 0) pDebuff   = aiC.debuff;

  showHPPop(Math.floor(dP), true);
  aHP = Math.max(0, aHP);
  pHP = Math.max(0, pHP);
}

function flashLog(msg) {
  const l = document.getElementById("logBox");
  l.innerHTML = `<span style="color:#f0997b">${msg}</span>`;
  setTimeout(() => { if (l.textContent.includes(msg.replace(/<[^>]+>/g,""))) l.innerHTML = "Kart seçin! Növbəyə almaq üçün klikləyin."; }, 1300);
}

/* AI LOGIC */
function aiChooseFromHand(availEnergy) {
  // Yalnız rəqibin əlindəki 4 karta baxır və onlardan uyğununu seçir
  const pool = aiHand.filter(c => c.cost <= availEnergy);
  if (!pool.length) return null;
  
  if (aHP < 25) { const h = pool.find(c => c.type === "heal");   if (h) return h; }
  if (aHP < 45) { const s = pool.find(c => c.type === "shield"); if (s) return s; }
  if (turn > 7)  return pool.sort((a,b) => b.atk - a.atk)[0];
  
  return pool.sort((a,b) =>
    (b.atk + b.shd*.5 + b.heal*.3) - (a.atk + a.shd*.5 + a.heal*.3)
  )[0];
}

/* END CHECK */
function checkEnd() {
  if (pHP > 0 && aHP > 0) return;
  setTimeout(() => {
    let title, sub;
    if (pHP <= 0 && aHP <= 0) { title = "Bərabərə!";      sub = "İkisi də eyni anda məğlub oldu!"; }
    else if (pHP <= 0)         { title = "Məğlubiyyət";    sub = "AI qalib gəldi. Daha güclü deck yığ!"; }
    else                       { title = "Qalibiyyət! 🎉"; sub = "Sən AI-ni məğlub etdin!"; }

    document.getElementById("resultTitle").textContent = title;
    document.getElementById("resultSub").textContent   = sub;
    document.getElementById("rHP").textContent         = Math.max(0, Math.floor(pHP));
    document.getElementById("rTurns").textContent      = turnsPlayed;
    document.getElementById("rCards").textContent      = hand.length;
    show("resultScreen");
  }, 420);
}

/* RENDER BATTLE */
function renderBattle() {
  const ph = Math.max(0, Math.floor(pHP));
  const ah = Math.max(0, Math.floor(aHP));
  document.getElementById("pHP").textContent  = ph;
  document.getElementById("aHP").textContent  = ah;
  document.getElementById("pBar").style.width = ph + "%";
  document.getElementById("aBar").style.width = ah + "%";
  document.getElementById("turnBadge").textContent = "Tur " + turn;
  document.getElementById("turnTxt").textContent   = "Tur " + turn;

  const pipsEl = document.getElementById("pips");
  pipsEl.innerHTML = "";
  for (let i = 0; i < 10; i++) {
    const d = document.createElement("div");
    d.className = "pip" + (i < energy ? " on" : "");
    pipsEl.appendChild(d);
  }

  renderHand();
  renderPlayedRow();
}

function renderHand() {
  const h = document.getElementById("hand");
  h.innerHTML = "";
  hand.forEach((c, i) => {
    const can = c.cost <= energy;
    const div = document.createElement("div");
    div.className = "gcard" + (can ? "" : " cant");
    div.innerHTML = `
      <div class="gcard-cost">${c.cost}</div>
      <div class="gcard-icon">${ICONS[c.type] || ""}</div>
      <div class="gcard-name">${c.name}</div>
      ${c.atk    > 0 ? `<div class="gcard-stat"><span>ATK</span><span>${c.atk}</span></div>` : ""}
      ${c.shd    > 0 ? `<div class="gcard-stat"><span>SHD</span><span>${c.shd}</span></div>` : ""}
      ${c.heal   > 0 ? `<div class="gcard-stat"><span>HEAL</span><span>+${c.heal}</span></div>` : ""}
      ${c.crit   > 0 ? `<div class="gcard-stat"><span>CRIT</span><span>${Math.round(c.crit*100)}%</span></div>` : ""}
      ${c.poison > 0 ? `<div class="gcard-stat"><span>ZHR</span><span>${c.poison}t</span></div>` : ""}
      ${c.buffNext > 0 ? `<div class="gcard-stat"><span>BUFF</span><span>+${Math.round(c.buffNext*100)}%</span></div>` : ""}
      ${c.debuff > 0  ? `<div class="gcard-stat"><span>DEB</span><span>-${Math.round(c.debuff*100)}%</span></div>` : ""}
    `;
    if (can) div.onclick = () => playCard(i, div);
    h.appendChild(div);
  });
}

function renderPlayedRow() {
  const list = document.getElementById("playedList");
  if (!playedThisTurn.length) {
    list.innerHTML = `<span style="color:#555">heç bir kart növbəyə alınmayıb</span>`;
    return;
  }
  list.innerHTML = playedThisTurn.map(n =>
    `<span class="played-tag">${n}</span>`
  ).join(" ");
}

/* DAMAGE POP */
function showHPPop(dmg, isPlayer) {
  if (!dmg) return;
  const el    = document.getElementById(isPlayer ? "pHP" : "aHP");
  const rootEl = document.getElementById("root");
  const r     = el.getBoundingClientRect();
  const rr    = rootEl.getBoundingClientRect();
  const d     = document.createElement("div");
  d.className = "dmg-pop";
  d.style.left  = (r.left - rr.left + r.width / 2) + "px";
  d.style.top   = (r.top  - rr.top)  + "px";
  d.style.color = "#f0997b";
  d.textContent = "-" + dmg;
  rootEl.style.position = "relative";
  rootEl.appendChild(d);
  setTimeout(() => d.remove(), 720);
}
